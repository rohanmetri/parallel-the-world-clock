<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Parallel</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app" class="mode-analog">
    <header>
      <div class="header-left">
        <div class="header-icon">
          <span class="mdi--parallel-box"></span>
        </div>
        <h1>Parallel</h1>
      </div>
      <div class="mode-toggle" role="radiogroup" aria-label="Display mode">
        <button class="mode-btn active" data-mode="analog" role="radio" aria-checked="true">Analog</button>
        <button class="mode-btn" data-mode="digital" role="radio" aria-checked="false">Digital</button>
      </div>
    </header>

    <div class="search-section">
      <div class="search-input-wrap">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.5"/>
          <line x1="11" y1="11" x2="14.5" y2="14.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <input type="text" id="topSearch" placeholder="Search city or timezone..." autocomplete="off" autocorrect="off" spellcheck="false">
      </div>
      <div id="topSearchResults" class="search-dropdown"></div>
    </div>

    <main id="clockGrid"></main>

    <div class="slider-section">
      <div class="slider-header">
        <span class="slider-label">Time Scrubber</span>
        <div class="slider-actions">
          <span id="sliderDisplay" class="slider-display">Now</span>
          <button id="sliderReset" class="btn-reset">Reset</button>
        </div>
      </div>
      <input type="range" id="timeSlider" min="-12" max="12" step="0.01" value="0">
      <div class="slider-labels">
        <span>−12h</span>
        <span>−6h</span>
        <span>Now</span>
        <span>+6h</span>
        <span>+12h</span>
      </div>
    </div>

  </div>

  <div id="searchModal" class="modal">
    <div class="modal-backdrop"></div>
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <input type="text" id="searchInput" placeholder="Search cities..." autocomplete="off" autocorrect="off" spellcheck="false">
      <div id="searchResults"></div>
    </div>
  </div>

  <div id="cardPopup" class="card-popup">
    <div id="cardPopupInner"></div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="js/cities.js"></script>
  <script src="js/clocks.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
